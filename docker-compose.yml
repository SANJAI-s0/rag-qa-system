version: '3.8'

services:
  rag-system:
    build: .
    container_name: rag-qa-system
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount outputs directory for results
      - ./outputs:/app/outputs
      # Mount models directory for FAISS index
      - ./models:/app/models
      # Mount .env file for configuration
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    # Restart policy
    restart: "no"
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    # Run in interactive mode
    stdin_open: true
    tty: true

  # Optional: For development with hot reload
  rag-system-dev:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rag-qa-system-dev
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: ["python", "-m", "pytest", "tests/", "-v"]
    restart: "no"
