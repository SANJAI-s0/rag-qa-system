[pytest]
# Python path configuration
pythonpath = . tests

# Test discovery paths
testpaths = tests

# Warning filters
filterwarnings = 
    # Ignore cryptography deprecation warnings (external library)
    ignore:ARC4 has been moved to cryptography.hazmat.decrepit:DeprecationWarning
    ignore:.*cryptography.*:DeprecationWarning
    
    # Ignore FAISS swig warnings (external library)
    ignore:builtin type SwigPyPacked has no __module__:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__:DeprecationWarning
    
    # Convert pytest return warnings to errors (to catch mistakes)
    error:PytestReturnNotNoneWarning
    
    # Show all other warnings
    default

# Test output format
console_output_style = progress

# Verbosity
verbosity = 1

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=3

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    slow: Tests that take longer to run
    quality: Quality assessment tests
    performance: Performance benchmark tests
    batch: Batch processing tests
    interactive: Interactive test mode